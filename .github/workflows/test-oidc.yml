name: Test OIDC Connection

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test AWS OIDC Connection
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::916994818641:role/kindswap-github-actions-role
          aws-region: us-east-1

      - name: Test AWS connection
        run: |
          echo "✅ AWS OIDC connection successful!"
          echo "---"
          aws sts get-caller-identity
          echo "---"
          echo "ECR Repositories:"
          aws ecr describe-repositories --region us-east-1 --query 'repositories[].repositoryName' --output table
