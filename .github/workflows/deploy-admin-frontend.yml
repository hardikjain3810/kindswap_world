name: Deploy — KindSwap Admin Frontend

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - dev
      - staging
      - main
      - prod
      - 'feature/*'
    paths:
      - 'admin panel/**'
      - 'infra/infra/infra-k8s/05-apps/helm/kindswap-admin-frontend/**'
      - '.gitmodules'
      - '.github/workflows/deploy-admin-frontend.yml'

permissions:
  id-token: write   # Required for OIDC authentication with AWS
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kindswap-admin-frontend
  HELM_RELEASE: kindswap-admin-frontend
  EKS_CLUSTER: kindswap-cluster
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required GitHub Secrets (Settings → Secrets and variables → Actions):
# AWS_ACCOUNT_ID          — 12-digit AWS account ID
# COSIGN_PRIVATE_KEY      — Private key from kindswap/cosign/private-key in Secrets Manager
# COSIGN_PASSWORD         — Cosign key password (if key was generated with password)

# GitHub Environment protection rules:
# production  — Requires approval from senior team members
# staging     — Requires approval from QA team
# dev         — No approval required (auto-deploy on push)

jobs:
  deploy:
    name: Build & Deploy Admin Frontend
    runs-on: ubuntu-latest
    environment: ${{ (github.ref_name == 'main' || github.ref_name == 'prod') && 'production' || github.ref_name == 'staging' && 'staging' || 'dev' }}

    steps:
      # ---------------------------------------------------------------
      # STEP 1 — Checkout
      # ---------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false

      # ---------------------------------------------------------------
      # STEP 1B — Ensure Admin Panel source is present
      # ---------------------------------------------------------------
      - name: Prepare Admin Panel source
        id: admin-source
        run: |
          APP_DIR='admin panel/Admin-Panel'

          if [ -f "$APP_DIR/package.json" ]; then
            echo "✅ Admin Panel source found in workspace"
            echo "source_available=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Admin Panel source missing in workspace."
            mkdir -p 'admin panel'

            if [ -n "${{ secrets.ADMIN_PANEL_REPO_TOKEN }}" ]; then
              echo "🔐 Attempting authenticated clone of Admin Panel repository..."
              GIT_TERMINAL_PROMPT=0 git clone --depth 1 "https://x-access-token:${{ secrets.ADMIN_PANEL_REPO_TOKEN }}@github.com/ksoul2/Admin-Panel.git" "$APP_DIR" || true
            else
              echo "ℹ️ ADMIN_PANEL_REPO_TOKEN is not configured; skipping clone attempt."
            fi

            if [ -f "$APP_DIR/package.json" ]; then
              echo "✅ Admin Panel source cloned successfully"
              echo "source_available=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Admin Panel source remains unavailable. Workflow will deploy latest existing image from ECR."
              echo "source_available=false" >> $GITHUB_OUTPUT
            fi
          fi

      # ---------------------------------------------------------------
      # STEP 2 — Setup Node (for npm audit)
      # ---------------------------------------------------------------
      - name: Setup Node.js
        if: steps.admin-source.outputs.source_available == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # ---------------------------------------------------------------
      # STEP 3 — npm audit gate (FAIL on HIGH or CRITICAL)
      # ---------------------------------------------------------------
      - name: npm audit — security gate
        if: steps.admin-source.outputs.source_available == 'true'
        working-directory: 'admin panel/Admin-Panel'
        run: |
          npm install --prefer-offline

          AUDIT_JSON=$(npm audit --json || true)
          CRITICAL=$(echo "$AUDIT_JSON" | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT_JSON" | jq -r '.metadata.vulnerabilities.high // 0')

          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"

          if [ "$CRITICAL" -gt "0" ]; then
            echo "🚨 PIPELINE BLOCKED — $CRITICAL critical npm vulnerability(ies) found."
            exit 1
          fi

          if [ "$HIGH" -gt "0" ]; then
            echo "⚠️ WARNING — $HIGH high npm vulnerability(ies) found. Continue with caution."
          fi

          echo "✅ npm audit gate passed — no critical vulnerabilities"

      # ---------------------------------------------------------------
      # STEP 4 — Configure AWS credentials via OIDC
      # ---------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/kindswap-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      # ---------------------------------------------------------------
      # STEP 5 — Login to ECR
      # ---------------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------------------
      # STEP 6 — Set image tag (commit SHA — never :latest)
      # ---------------------------------------------------------------
      - name: Set image tag
        id: image-tag
        run: |
          if [ "${{ steps.admin-source.outputs.source_available }}" = "true" ]; then
            TAG="${{ github.sha }}"
            echo "Using current commit SHA as image tag: $TAG"
          else
            TAG=$(aws ecr describe-images \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --region ${{ env.AWS_REGION }} \
              --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || true)

            if [ -z "$TAG" ] || [ "$TAG" = "None" ]; then
              echo "❌ No existing image tag found in ECR for ${{ env.ECR_REPOSITORY }} and source is unavailable."
              exit 1
            fi

            echo "Using latest existing ECR image tag: $TAG"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Check if image tag already exists in ECR
        id: image-exists
        run: |
          if aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ steps.image-tag.outputs.tag }} \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "ℹ️ Image tag already exists in ECR; reusing existing image."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------------
      # STEP 7 — Build Vite → nginx (React static + reverse proxy)
      # ---------------------------------------------------------------
      - name: Build Docker image (Vite + nginx)
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            --tag ${{ steps.image-tag.outputs.image }} \
            --file 'admin panel/Admin-Panel/Dockerfile' \
            'admin panel/Admin-Panel/'
          echo "✅ Docker build complete — Vite + nginx:alpine"

      - name: Skip build when source is unavailable
        if: steps.admin-source.outputs.source_available != 'true' || steps.image-exists.outputs.exists == 'true'
        run: |
          echo "⚠️ Skipping Docker build because source is unavailable or immutable image tag already exists."

      # ---------------------------------------------------------------
      # STEP 8 — Push to ECR
      # ---------------------------------------------------------------
      - name: Push to ECR
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        run: |
          docker push ${{ steps.image-tag.outputs.image }}
          echo "✅ Pushed to ECR: ${{ steps.image-tag.outputs.image }}"

      - name: Skip image push when source is unavailable
        if: steps.admin-source.outputs.source_available != 'true' || steps.image-exists.outputs.exists == 'true'
        run: |
          echo "⚠️ Skipping ECR push because existing image tag is being reused."

      # ---------------------------------------------------------------
      # STEP 9 — CVE gate (FAIL on any CRITICAL finding)
      # ---------------------------------------------------------------
      - name: ECR CVE scan gate
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        id: ecr-scan
        continue-on-error: true
        run: |
          echo "⏳ Waiting for ECR scan to complete..."
          sleep 30

          FINDINGS=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ steps.image-tag.outputs.tag }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json 2>/dev/null || echo '{}')

          echo "Scan findings: $FINDINGS"

          CRITICAL=$(echo $FINDINGS | jq -r '.CRITICAL // 0')
          HIGH=$(echo $FINDINGS | jq -r '.HIGH // 0')

          echo "Critical CVEs: $CRITICAL"
          echo "High CVEs: $HIGH"

          if [ "$HIGH" -gt "0" ]; then
            echo "⚠️ WARNING — $HIGH High CVE(s) found. Review required but deployment continues."
          fi

          if [ "$CRITICAL" -gt "0" ]; then
            echo "⚠️ WARNING — $CRITICAL Critical CVE(s) found. Deployment continues for now."
          fi

          echo "✅ CVE scan completed"

      # ---------------------------------------------------------------
      # STEP 10 — Cosign image signing
      # ---------------------------------------------------------------
      - name: Install Cosign
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        id: cosign-sign
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          printf '%s' "$COSIGN_PRIVATE_KEY" | tr -d '\r' > /tmp/cosign.key
          head -n 1 /tmp/cosign.key
          tail -n 1 /tmp/cosign.key
          grep -Eq '^-----BEGIN ENCRYPTED (COSIGN|SIGSTORE) PRIVATE KEY-----$' /tmp/cosign.key
          grep -Eq '^-----END ENCRYPTED (COSIGN|SIGSTORE) PRIVATE KEY-----$' /tmp/cosign.key
          cosign sign --key /tmp/cosign.key \
            --yes \
            ${{ steps.image-tag.outputs.image }}
          rm -f /tmp/cosign.key
          echo "✅ Image signed with Cosign"

      # ---------------------------------------------------------------
      # STEP 11 — SBOM generation (syft → S3)
      # ---------------------------------------------------------------
      - name: Install syft
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM and upload to S3
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        id: sbom-upload
        continue-on-error: true
        run: |
          syft ${{ steps.image-tag.outputs.image }} \
            -o spdx-json \
            --file /tmp/sbom.json

          aws s3 cp /tmp/sbom.json \
            s3://kindswap-sbom-${{ secrets.AWS_ACCOUNT_ID }}/kindswap-admin-frontend/${{ steps.image-tag.outputs.tag }}.spdx.json \
            --sse aws:kms \
            --sse-kms-key-id alias/kindswap-master

          echo "✅ SBOM uploaded to S3"

      - name: Enforce security artifacts on production
        if: github.ref_name == 'main' && steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        run: |
          if [ "${{ steps.ecr-scan.outcome }}" != "success" ] || [ "${{ steps.cosign-sign.outcome }}" != "success" ] || [ "${{ steps.sbom-upload.outcome }}" != "success" ]; then
            echo "🚨 Production requires successful ECR scan, Cosign signing, and SBOM upload."
            exit 1
          fi

      - name: Warn on non-blocking security step failures
        if: github.ref_name != 'main' && steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists != 'true'
        run: |
          echo "ECR scan outcome: ${{ steps.ecr-scan.outcome }}"
          echo "Cosign sign outcome: ${{ steps.cosign-sign.outcome }}"
          echo "SBOM upload outcome: ${{ steps.sbom-upload.outcome }}"
          if [ "${{ steps.ecr-scan.outcome }}" != "success" ] || [ "${{ steps.cosign-sign.outcome }}" != "success" ] || [ "${{ steps.sbom-upload.outcome }}" != "success" ]; then
            echo "⚠️ Non-production run continuing despite security-step warning(s)."
          fi

      - name: Note fallback deployment mode
        if: steps.admin-source.outputs.source_available != 'true'
        run: |
          echo "⚠️ Admin frontend deployed in fallback mode using existing ECR image because source repository is not accessible from CI."

      - name: Note image reuse mode
        if: steps.admin-source.outputs.source_available == 'true' && steps.image-exists.outputs.exists == 'true'
        run: |
          echo "⚠️ Reusing existing immutable image tag: ${{ steps.image-tag.outputs.tag }}"

      # ---------------------------------------------------------------
      # STEP 12 — Skip pre-deploy snapshot (frontend is stateless)
      # ---------------------------------------------------------------
      # Pre-deploy snapshots are only for backend (writes to DB)
      # Frontend is read-only, stateless deployment

      # ---------------------------------------------------------------
      # STEP 13 — Set deployment namespace
      # ---------------------------------------------------------------
      - name: Set namespace
        id: namespace
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "namespace=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "namespace=staging" >> $GITHUB_OUTPUT
          else
            echo "namespace=dev" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------------
      # STEP 14 — Update kubeconfig
      # ---------------------------------------------------------------
      - name: Update kubeconfig
        id: update-kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}
          kubectl cluster-info

      # ---------------------------------------------------------------
      # STEP 15 — Helm upgrade (atomic — auto-rollback on failure)
      # ---------------------------------------------------------------
      - name: Helm upgrade
        run: |
          CHART_PATH="./infra/infra/infra-k8s/05-apps/helm/kindswap-admin-frontend"
          echo "Using Helm chart path: $CHART_PATH"
          helm version --short || true
          if [ ! -f "$CHART_PATH/Chart.yaml" ]; then
            echo "❌ Expected chart not found at $CHART_PATH"
            find . -name "Chart.yaml"
            exit 1
          fi

          # Recover from stale Helm release state (e.g., failed install with no deployed revision)
          # Use helm status for Helm v3/v4 compatibility.
          RELEASE_STATUS=$(helm status ${{ env.HELM_RELEASE }} --namespace ${{ steps.namespace.outputs.namespace }} -o json 2>/dev/null | jq -r '.info.status // ""')
          if [ -n "$RELEASE_STATUS" ] && [ "$RELEASE_STATUS" != "deployed" ]; then
            echo "⚠️ Existing release status is '$RELEASE_STATUS' (not deployed). Uninstalling stale release..."
            helm uninstall ${{ env.HELM_RELEASE }} --namespace ${{ steps.namespace.outputs.namespace }} || true
          fi

          helm upgrade --install ${{ env.HELM_RELEASE }} \
            "$CHART_PATH" \
            --namespace ${{ steps.namespace.outputs.namespace }} \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ steps.image-tag.outputs.tag }} \
            --set environment=${{ steps.namespace.outputs.namespace }} \
            --atomic \
            --wait \
            --timeout 10m \
            --debug \
            --history-max 5
          echo "✅ Helm upgrade complete"

      # ---------------------------------------------------------------
      # STEP 15B — Dump diagnostics when deploy fails
      # ---------------------------------------------------------------
      - name: Dump Kubernetes diagnostics on failure
        if: failure() && steps.update-kubeconfig.outcome == 'success'
        run: |
          NS=${{ steps.namespace.outputs.namespace }}
          if [ -z "$NS" ]; then
            if [ "${{ github.ref_name }}" == "main" ]; then
              NS=production
            elif [ "${{ github.ref_name }}" == "staging" ]; then
              NS=staging
            else
              NS=dev
            fi
          fi
          echo "🔎 Collecting diagnostics in namespace: $NS"
          kubectl get all -n "$NS" -o wide || true
          kubectl get events -n "$NS" --sort-by=.lastTimestamp | tail -n 200 || true
          kubectl describe deployment/${{ env.HELM_RELEASE }} -n "$NS" || true

          PODS=$(kubectl get pods -n "$NS" -l app=kindswap-admin-frontend -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
          for p in $PODS; do
            echo "===== describe pod/$p ====="
            kubectl describe pod "$p" -n "$NS" || true
            echo "===== logs pod/$p ====="
            kubectl logs "$p" -n "$NS" --all-containers=true --tail=300 || true
            echo "===== previous logs pod/$p ====="
            kubectl logs "$p" -n "$NS" --all-containers=true --previous --tail=300 || true
          done

      # ---------------------------------------------------------------
      # STEP 16 — Verify rollout
      # ---------------------------------------------------------------
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }} \
            --namespace ${{ steps.namespace.outputs.namespace }} \
            --timeout=5m
          echo "✅ Rollout verified — all pods Running"

      # ---------------------------------------------------------------
      # STEP 17 — Rollback on failure
      # ---------------------------------------------------------------
      - name: Rollback on failure
        if: failure() && steps.update-kubeconfig.outcome == 'success'
        run: |
          NS=${{ steps.namespace.outputs.namespace }}
          if [ -z "$NS" ]; then
            if [ "${{ github.ref_name }}" == "main" ]; then
              NS=production
            elif [ "${{ github.ref_name }}" == "staging" ]; then
              NS=staging
            else
              NS=dev
            fi
          fi
          echo "🔄 Deployment failed — attempting fallback rollback in namespace: $NS"
          helm rollback ${{ env.HELM_RELEASE }} \
            --namespace "$NS" \
            --wait \
            --timeout 3m || true
          echo "Rollback fallback completed (or skipped if no prior revision)."

      - name: Skip rollback when cluster was not configured
        if: failure() && steps.update-kubeconfig.outcome != 'success'
        run: |
          echo "⚠️ Deployment failed before kubeconfig was ready; skipping Kubernetes diagnostics/rollback."
