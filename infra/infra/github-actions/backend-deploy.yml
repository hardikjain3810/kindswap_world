name: Backend Deploy

on:
  push:
    branches: [dev, staging, main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kindswap-backend
  EKS_CLUSTER: kindswap-cluster
  HELM_RELEASE: kindswap-backend
  HELM_CHART_PATH: infra/infra-k8s/05-apps/backend-chart

jobs:
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    outputs:
      namespace: ${{ steps.set-env.outputs.namespace }}
      environment: ${{ steps.set-env.outputs.environment }}
      approval_required: ${{ steps.set-env.outputs.approval_required }}

    steps:
      - name: Determine target environment
        id: set-env
        run: |
          case "${{ github.ref }}" in
            refs/heads/dev)
              echo "namespace=dev" >> "$GITHUB_OUTPUT"
              echo "environment=development" >> "$GITHUB_OUTPUT"
              echo "approval_required=false" >> "$GITHUB_OUTPUT"
              ;;
            refs/heads/staging)
              echo "namespace=staging" >> "$GITHUB_OUTPUT"
              echo "environment=staging" >> "$GITHUB_OUTPUT"
              echo "approval_required=false" >> "$GITHUB_OUTPUT"
              ;;
            refs/heads/main)
              echo "namespace=production" >> "$GITHUB_OUTPUT"
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "approval_required=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "namespace=dev" >> "$GITHUB_OUTPUT"
              echo "environment=development" >> "$GITHUB_OUTPUT"
              echo "approval_required=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-BackendBuild-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            --cache-from "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            ./admin\ backend

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [determine-environment, build-and-push]
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-BackendDeploy-${{ github.run_id }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER" \
            --region "$AWS_REGION"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Create namespace if not exists
        run: |
          kubectl create namespace "${{ needs.determine-environment.outputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          HELM_NAMESPACE: ${{ needs.determine-environment.outputs.namespace }}
          ACM_CERT_ARN: ${{ secrets.ACM_BACKEND_CERT_ARN }}
        run: |
          helm upgrade --install "$HELM_RELEASE" "$HELM_CHART_PATH" \
            --namespace "$HELM_NAMESPACE" \
            --create-namespace \
            --set "image.repository=$ECR_REGISTRY/$ECR_REPOSITORY" \
            --set "image.tag=$IMAGE_TAG" \
            --set "ingress.certificateArn=$ACM_CERT_ARN" \
            --atomic \
            --wait \
            --timeout 5m \
            --history-max 5

      - name: Verify deployment
        env:
          HELM_NAMESPACE: ${{ needs.determine-environment.outputs.namespace }}
        run: |
          kubectl rollout status deployment/"$HELM_RELEASE" \
            --namespace "$HELM_NAMESPACE" \
            --timeout=300s

      - name: Rollback on failure
        if: failure()
        env:
          HELM_NAMESPACE: ${{ needs.determine-environment.outputs.namespace }}
        run: |
          helm rollback "$HELM_RELEASE" --namespace "$HELM_NAMESPACE"
          echo "Rolled back to previous version"

      - name: Print deployment info
        if: success()
        env:
          HELM_NAMESPACE: ${{ needs.determine-environment.outputs.namespace }}
        run: |
          echo "=== Deployment Complete ==="
          echo "Image: ${{ needs.build-and-push.outputs.ecr_registry }}/$ECR_REPOSITORY:${{ needs.build-and-push.outputs.image_tag }}"
          echo "Namespace: $HELM_NAMESPACE"
          echo "Release: $HELM_RELEASE"
          kubectl get pods -n "$HELM_NAMESPACE" -l "app.kubernetes.io/instance=$HELM_RELEASE"
