{{- if .Values.externalSecrets.enabled }}
{{- range .Values.externalSecrets.secrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kind-swap-backend.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        DB_HOST: "{{ `{{ .host }}` }}"
        DB_PORT: "{{ `{{ .port }}` }}"
        DB_NAME: "{{ `{{ .dbname }}` }}"
        DB_USER: "{{ `{{ .username }}` }}"
        DB_PASSWORD: "{{ `{{ .password }}` }}"
        DATABASE_URL: "{{ `{{ .url }}` }}"
  data:
    - secretKey: host
      remoteRef:
        key: {{ .remoteRef.key }}
        property: host
    - secretKey: port
      remoteRef:
        key: {{ .remoteRef.key }}
        property: port
    - secretKey: dbname
      remoteRef:
        key: {{ .remoteRef.key }}
        property: dbname
    - secretKey: username
      remoteRef:
        key: {{ .remoteRef.key }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .remoteRef.key }}
        property: password
    - secretKey: url
      remoteRef:
        key: {{ .remoteRef.key }}
        property: url
{{- end }}
{{- end }}
