# Development Environment Override Values
environment: dev

image:
  repository: ""
  tag: latest
  pullPolicy: Always

# Dev: Fixed single pod (no HPA)
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  name: kindswap-backend
  annotations: {}

nodeSelector: {}

ingress:
  enabled: true
  host: dev.kindswap.world
  scheme: internal
  vpnCidr: ""
  certArn: arn:aws:acm:us-east-1:916994818641:certificate/f39e16e4-6479-4f02-8999-f600a495736c

# Dev: No HPA, fixed replicas only
hpa:
  enabled: false
  targetCPUPercent: 70

pgPool:
  max: 40
