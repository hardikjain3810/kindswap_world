apiVersion: apps/v1
kind: Deployment
metadata:
  name: kindswap-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: kindswap-backend
    environment: {{ .Values.environment }}
spec:
  selector:
    matchLabels:
      app: kindswap-backend
      environment: {{ .Values.environment }}
  template:
    metadata:
      labels:
        app: kindswap-backend
        environment: {{ .Values.environment }}
    spec:
      imagePullSecrets:
        - name: ecr-secret
      serviceAccountName: {{ .Values.serviceAccount.name }}
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kindswap-secrets
      containers:
        - name: kindswap-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5000
              name: http
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          env:
            - name: NODE_ENV
              value: {{ .Values.environment }}
            - name: DB_CREDENTIALS_PATH
              value: /mnt/secrets/db-credentials
            - name: PG_POOL_MAX
              value: "{{ .Values.pgPool.max }}"
          envFrom:
            - secretRef:
                name: kindswap-api-keys
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
