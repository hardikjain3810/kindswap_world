apiVersion: v1
kind: Service
metadata:
  name: kindswap-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: kindswap-backend
spec:
  selector:
    app: kindswap-backend
    environment: {{ .Values.environment }}
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  type: ClusterIP
