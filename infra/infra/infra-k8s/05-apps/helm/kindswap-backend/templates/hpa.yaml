{{- if and (typeIs "map" .Values.replicaCount) (hasKey .Values.replicaCount "min") }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kindswap-backend
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kindswap-backend
  minReplicas: {{ .Values.replicaCount.min }}
  maxReplicas: {{ .Values.replicaCount.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUPercent }}
{{- end }}
