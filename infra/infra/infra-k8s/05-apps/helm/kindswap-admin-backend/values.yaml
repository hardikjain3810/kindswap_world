replicaCount:
  min: 1
  max: 5

image:
  repository: ""  # Will be overridden by Helm upgrade --set image.repository
  tag: latest

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

environment: dev

serviceAccount:
  # Reuse backend IRSA-enabled service account until a dedicated admin backend IRSA role is provisioned.
  create: true
  name: kindswap-backend
  annotations: {}

ingress:
  enabled: true
  host: admin-api.production.kindswap.world
  scheme: internet-facing
  certArn: arn:aws:acm:us-east-1:916994818641:certificate/f39e16e4-6479-4f02-8999-f600a495736c

pgPool:
  max:
    production: 40
    staging: 20
    dev: 10

secrets:
  # Reuse existing CSI SecretProviderClass already used by backend
  secretProviderClass: kindswap-secrets
  mountPath: /mnt/secrets
