replicaCount:
  min: 1
  max: 5

image:
  repository: ""  # Will be overridden by Helm upgrade --set image.repository
  tag: latest

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

environment: dev

pgPool:
  max:
    production: 40
    staging: 20
    dev: 10

secrets:
  # Reference to the Kubernetes secret created by SecretProviderClass
  name: kindswap-backend-secrets
  mountPath: /mnt/secrets
