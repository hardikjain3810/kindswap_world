apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kindswap-admin-backend.fullname" . }}
  labels:
    {{- include "kindswap-admin-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.min }}
  selector:
    matchLabels:
      {{- include "kindswap-admin-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kindswap-admin-backend.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      volumes:
      - name: secrets
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ .Values.secrets.secretProviderClass }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: secrets
          mountPath: {{ .Values.secrets.mountPath }}
          readOnly: true
        env:
        - name: NODE_ENV
          value: {{ .Values.environment }}
        - name: DB_POOL_MAX
          value: "{{ index .Values.pgPool.max .Values.environment }}"
        - name: DB_CREDENTIALS_PATH
          value: {{ .Values.secrets.mountPath }}/db-credentials
