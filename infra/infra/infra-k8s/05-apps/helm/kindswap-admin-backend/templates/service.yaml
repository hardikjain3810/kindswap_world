apiVersion: v1
kind: Service
metadata:
  name: {{ include "kindswap-admin-backend.fullname" . }}
  labels:
    {{- include "kindswap-admin-backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "kindswap-admin-backend.selectorLabels" . | nindent 4 }}
