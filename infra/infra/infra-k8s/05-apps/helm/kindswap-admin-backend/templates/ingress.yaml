apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kindswap-admin-backend.fullname" . }}
  labels:
    {{- include "kindswap-admin-backend.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.connection.keep_alive.enabled=true
spec:
  ingressClassName: alb
  rules:
  - host: "admin-api.{{ .Values.environment }}.kindswap.world"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "kindswap-admin-backend.fullname" . }}
            port:
              number: 80
