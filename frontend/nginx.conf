server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --------------------------
    # API → Backend
    # --------------------------
    location /api/ {
        proxy_pass http://172.17.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # --------------------------
    # SECURITY: Block source map files from public access
    # Source maps contain full application source code
    # --------------------------
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # --------------------------
    # Static assets
    # --------------------------
    location /assets/ {
        try_files $uri =404;
    }

    # --------------------------
    # SPA Routing
    # --------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
