apiVersion: batch/v1
kind: Job
metadata:
  name: fix-prod-migration
  namespace: production
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: kindswap-backend
      containers:
      - name: db-fix
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "DB Fix Job Starting..."
          
          export DB_HOST="kindswap-prod.cov8e4myuic2.us-east-1.rds.amazonaws.com"
          export DB_USER="postgres"
          export DB_NAME="kindswap"
          
          # Try to connect with retries
          for i in {1..30}; do
            if psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -c "SELECT 1" 2>&1 | grep -q "SELECT 1"; then
              echo "Connected successfully!"
              break
            fi
            echo "Attempt $i/30: Waiting for RDS..."
            sleep 2
          done
          
          # Execute the fix
          echo "Running migrations fix..."
          psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" <<EOF
          BEGIN;
          DELETE FROM typeorm_metadata WHERE name = 'ChangeAdminPermissionsToArray1739356400000';
          ALTER TABLE admins ALTER COLUMN permissions DROP DEFAULT;
          COMMIT;
          EOF
          
          echo "✓ Fix applied successfully!"
          
          # Verify the fix
          echo "Verifying fix..."
          psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -c "SELECT column_name, column_default, data_type FROM information_schema.columns WHERE table_name = 'admins' AND column_name = 'permissions';"
      restartPolicy: Never
