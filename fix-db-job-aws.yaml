apiVersion: batch/v1
kind: Job
metadata:
  name: fix-prod-migration
  namespace: production
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: kindswap-backend
      containers:
      - name: db-fix
        image: amazon/aws-cli:latest
        env:
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: AWS_ROLE_ARN
          value: "arn:aws:iam::ACCOUNT_ID:role/kindswap-backend-prod-irsa"
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
        volumeMounts:
        - name: aws-token
          mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
          readOnly: true
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Testing AWS CLI connectivity..."
          aws sts get-caller-identity
          
          echo "Listing RDS databases..."
          aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,Endpoint.Address]' --output table
      volumes:
      - name: aws-token
        projected:
          sources:
          - serviceAccountToken:
              audience: sts.amazonaws.com
              expirationSeconds: 3600
              path: token
      restartPolicy: Never
