services:
  postgres:
    image: postgres:16-alpine
    container_name: kindsoul_postgres
    environment:
      POSTGRES_USER: kindsoul_user
      POSTGRES_PASSWORD: kindsoul_secure_password_change_me
      POSTGRES_DB: kindsoul_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kindsoul_user -d kindsoul_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kindsoul_redis
    command: redis-server --requirepass redis_password_change_me
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
