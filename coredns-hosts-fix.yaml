apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
        }
        prometheus :9153
        
        # Custom hosts for VPC endpoints - direct IP mapping
        hosts /etc/coredns/hosts {
            fallthrough
        }
        
        forward . /etc/resolv.conf
        cache 30
        loop
        reload
        loadbalance
    }
  hosts: |
    # VPC Endpoint IPs for AWS Secrets Manager
    10.0.11.51 secretsmanager.us-east-1.amazonaws.com
    10.0.12.66 secretsmanager.us-east-1.amazonaws.com
    10.0.11.51 sts.us-east-1.amazonaws.com
    10.0.12.66 sts.us-east-1.amazonaws.com
