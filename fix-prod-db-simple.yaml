apiVersion: batch/v1
kind: Job
metadata:
  name: fix-prod-db
  namespace: production
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: kindswap-backend
      containers:
      - name: psql-fix
        image: postgres:16-alpine
        env:
        - name: PGHOST
          value: "kindswap-prod.cov8e4myuic2.us-east-1.rds.amazonaws.com"
        - name: PGUSER
          value: "kindswap_admin"
        - name: PGPASSWORD
          value: "KindSwapProd2026SecurePass32Chr"
        - name: PGDATABASE
          value: "kindswap_production"
        command:
        - /bin/sh
        - -c
        - |
          psql << 'EOF'
          BEGIN;
          DELETE FROM typeorm_metadata WHERE name='ChangeAdminPermissionsToArray1739356400000';
          ALTER TABLE admins ALTER COLUMN permissions DROP DEFAULT;
          COMMIT;
          EOF
          echo "✅ Database fix completed!"
      restartPolicy: Never
