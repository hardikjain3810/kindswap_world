apiVersion: batch/v1
kind: Job
metadata:
  name: fix-prod-migration
  namespace: production
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: kindswap-backend
      containers:
      - name: db-fix
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          set -e
          echo "Extracting DB credentials from mounted secret..."
          HOST=$(cat /mnt/secrets/db-credentials | grep -o '"host":"[^"]*' | cut -d'"' -f4)
          USER=$(cat /mnt/secrets/db-credentials | grep -o '"username":"[^"]*' | cut -d'"' -f4)
          PASS=$(cat /mnt/secrets/db-credentials | grep -o '"password":"[^"]*' | cut -d'"' -f4)
          DB=$(cat /mnt/secrets/db-credentials | grep -o '"dbname":"[^"]*' | cut -d'"' -f4)
          
          echo "Connecting to $HOST as $USER..."
          PGPASSWORD="$PASS" psql -h "$HOST" -U "$USER" -d "$DB" <<SQL
          BEGIN;
          DELETE FROM typeorm_metadata WHERE name='ChangeAdminPermissionsToArray1739356400000';
          ALTER TABLE admins ALTER COLUMN permissions DROP DEFAULT;
          COMMIT;
          SQL
          echo "✅ Production database migration fix completed!"
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "kindswap-secrets"
      restartPolicy: Never
